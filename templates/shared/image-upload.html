<div class="mb-4">
    <label class="block mb-2 text-sm font-medium text-gray-700">Upload Image</label>

    <input type="file" name="image" id="image" class="hidden" onchange="document.getElementById('file-name').textContent = this.files[0].name">

    <label for="image" class="cursor-pointer block w-full text-sm text-gray-500
           file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0
           file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700
           hover:file:bg-blue-100 transition duration-300 ease-in-out px-4 py-2
           border border-gray-300 rounded-lg text-center">
        Choose File
    </label>

    <p id="file-name" class="mt-2 text-sm text-gray-600">No file chosen</p>

    {% if form.image.errors %}
        <p class="text-red-500 text-sm mt-1">{{ form.image.errors }}</p>
    {% endif %}
</div>
