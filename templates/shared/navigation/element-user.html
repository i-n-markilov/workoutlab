{% block auth %}
     <div class="relative group inline-block text-left">
         <button class="flex items-center text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition duration-150 ease-in-out">
             {% if user.is_authenticated %}
                 <span>{{ user.username|default:"User" }}</span>
             {% else %}
                 <span>Account</span>
             {% endif %}
             <svg class="ml-1 h-4 w-4 fill-current" viewBox="0 0 20 20">
                 <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
             </svg>
         </button>

         <div class="absolute right-0 mt-0 w-48 origin-top-right rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-50
                     invisible group-hover:visible opacity-0 group-hover:opacity-100 transition-all duration-300 transform scale-95 group-hover:scale-100">
             <div class="py-1">
                 {% if user.is_authenticated %}
                     <a href="{% url 'accounts:profile' user.pk %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
                     <form method="post" action="{% url 'accounts:logout' %}">
                         {% csrf_token %}
                         <button type="submit" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 focus:outline-none">
                             Logout
                         </button>
                     </form>
                 {% else %}
                     <a href="{% url 'accounts:login' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Login</a>
                     <a href="{% url 'accounts:register' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Register</a>
                 {% endif %}
             </div>
         </div>
     </div>
{% endblock %}
