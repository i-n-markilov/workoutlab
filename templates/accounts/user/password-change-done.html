{% extends 'shared/base.html' %}
{% load static %}

{% block title %}
    Password Updated Successfully
{% endblock %}

{% block content %}
    <div class='flex flex-col items-center justify-center py-12'>
        <div class='w-full max-w-md bg-white p-8 rounded-lg shadow-xl text-center'>
            <div class='mb-6'>
                <div class='mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4'>
                    <svg class='h-10 w-10 text-green-600' fill='none' stroke='currentColor' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                        <path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 13l4 4L19 7'></path>
                    </svg>
                </div>
                <h1 class='text-3xl font-extrabold text-gray-900'>Success!</h1>
                <p class='text-gray-600 mt-2'>Your password has been successfully updated.</p>
            </div>

            <div class='mt-8 space-y-4'>
                <a href='{% url 'accounts:profile' pk=request.user.pk %}' class='block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300 ease-in-out transform hover:scale-105'>
                    Go to Profile
                </a>
                <a href='{% url 'common:home' %}' class='block w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-lg transition duration-300 ease-in-out'>
                    Back to Home
                </a>
            </div>
        </div>
    </div>
{% endblock content %}
